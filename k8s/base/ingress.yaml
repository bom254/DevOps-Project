apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trivia-ingress
  namespace: app
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: trivia.local
    http:
      paths:
      - pathType: /
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000