version: "3.9"

services:
  backend:
  build:
    context: ./backend
    dockerfile: Dockerfile
  container_name: trivia-backend
  ports:
    - "8000:8000"
  environment:
    - PYTHONUNBUFFERED=1
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s
  restart: unless-stopped
  networks:
    - trivia-net
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: trivia-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trivia-net

networks:
  trivia-net:
    driver: bridge